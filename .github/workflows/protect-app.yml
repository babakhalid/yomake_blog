name: Protect App Structure

on:
  push:
    branches: [main]

jobs:
  check-critical-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify critical app files exist
        run: |
          missing=0
          for file in package.json vite.config.ts src/main.tsx src/App.tsx index.html; do
            if [ ! -f "$file" ]; then
              echo "❌ MISSING: $file"
              missing=1
            else
              echo "✅ $file"
            fi
          done
          if [ $missing -eq 1 ]; then
            echo ""
            echo "🚨 Critical app files are missing! This push likely broke the blog."
            echo "Revert with: git revert HEAD && git push"
            exit 1
          fi
