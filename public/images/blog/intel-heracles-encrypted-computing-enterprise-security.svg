<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#1a1a3e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#7b2fff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Circuit lines -->
  <line x1="100" y1="315" x2="400" y2="315" stroke="#00d4ff" stroke-width="2" opacity="0.3"/>
  <line x1="800" y1="315" x2="1100" y2="315" stroke="#00d4ff" stroke-width="2" opacity="0.3"/>
  <line x1="600" y1="100" x2="600" y2="200" stroke="#7b2fff" stroke-width="2" opacity="0.3"/>
  <line x1="600" y1="430" x2="600" y2="530" stroke="#7b2fff" stroke-width="2" opacity="0.3"/>
  <!-- Chip outline -->
  <rect x="440" y="215" width="320" height="200" rx="12" fill="none" stroke="url(#glow)" stroke-width="3"/>
  <rect x="470" y="245" width="260" height="140" rx="6" fill="#0d0d2b" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
  <!-- Lock icon -->
  <rect x="570" y="290" width="60" height="50" rx="6" fill="none" stroke="#00d4ff" stroke-width="2.5"/>
  <path d="M580 290 V275 A20 20 0 0 1 620 275 V290" fill="none" stroke="#00d4ff" stroke-width="2.5"/>
  <circle cx="600" cy="315" r="5" fill="#00d4ff"/>
  <!-- Pin dots -->
  <circle cx="440" cy="260" r="4" fill="#00d4ff" opacity="0.6"/>
  <circle cx="440" cy="290" r="4" fill="#00d4ff" opacity="0.6"/>
  <circle cx="440" cy="320" r="4" fill="#00d4ff" opacity="0.6"/>
  <circle cx="440" cy="350" r="4" fill="#00d4ff" opacity="0.6"/>
  <circle cx="440" cy="380" r="4" fill="#00d4ff" opacity="0.6"/>
  <circle cx="760" cy="260" r="4" fill="#7b2fff" opacity="0.6"/>
  <circle cx="760" cy="290" r="4" fill="#7b2fff" opacity="0.6"/>
  <circle cx="760" cy="320" r="4" fill="#7b2fff" opacity="0.6"/>
  <circle cx="760" cy="350" r="4" fill="#7b2fff" opacity="0.6"/>
  <circle cx="760" cy="380" r="4" fill="#7b2fff" opacity="0.6"/>
  <!-- Text -->
  <text x="600" y="500" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" font-weight="700" fill="#ffffff">Encrypted Computing at Scale</text>
  <text x="600" y="535" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="#00d4ff" opacity="0.8">5,000x Faster Homomorphic Encryption</text>
